# Builds Tauri installers from mdds-labs/ayai-pos and publishes GitHub Release
# (bundles + updater latest.json + .sig) on THIS repo only.

name: Publish Tauri release

on:
  # Manual: set semver without "v" (e.g. 1.2.3). Tag on the release repo will be v1.2.3.
  workflow_dispatch:
    inputs:
      version:
        description: Semver only, no leading v (e.g. 1.2.3)
        required: true
        type: string
  # Automatic: push tag v* on this release repo; release/tag name = ref (e.g. v1.2.3).
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: publish-tauri-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    env:
      TAG_NAME: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', github.event.inputs.version) }}

    steps:
      - name: Checkout application source (ayai-pos)
        uses: actions/checkout@v4
        with:
          repository: mdds-labs/ayai-pos
          path: app
          token: ${{ secrets.AYAI_POS_REPO_TOKEN || github.token }}

      - name: Setup Node.js (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust stable (macOS targets)
        if: matrix.platform == 'macos-latest'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Rust stable
        if: matrix.platform != 'macos-latest'
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build and upload (tauri-action)
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          # `npx tauri` often fails because the CLI entrypoint lives in `@tauri-apps/cli`
          tauriScript: npx --yes "@tauri-apps/cli"
          tagName: ${{ env.TAG_NAME }}
          releaseName: ${{ env.TAG_NAME }}
          # Always build unsigned in CI (so you can push without signing keys).
          # This avoids failures when `TAURI_SIGNING_PRIVATE_KEY` is not configured.
          args: ${{ matrix.args }} --no-sign --verbose
          # Building updater signatures requires signing keys; for CI without keys, skip updater.
          includeUpdaterJson: false
